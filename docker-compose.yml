version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    volumes:
      - .env:/var/www/.env:ro
      - ./database/database.sqlite:/var/www/database/database.sqlite
      - ./storage:/var/www/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    restart: unless-stopped
